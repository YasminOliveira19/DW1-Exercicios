<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Placar</title>
  <link rel="stylesheet" href="placar2.css">
</head>
<body>

  <h1>PLACAR DE JOGO</h1>

  <div class="placar">
    <div class="time">
      <h2>Time A</h2>
      <p id="scoreA">0</p>
      <button onclick="addPoint('A')">+1</button>
      <button onclick="removePoint('A')">-1</button>
    </div>

    <div class="time">
      <h2>Time B</h2>
      <p id="scoreB">0</p>
      <button onclick="addPoint('B')">+1</button>
      <button onclick="removePoint('B')">-1</button>
    </div>
  </div>

  <div class="controles">
    <button onclick="resetScore()">RESETAR</button>
  </div>

  <script src="placar2.js"></script>
</body>
</html>
