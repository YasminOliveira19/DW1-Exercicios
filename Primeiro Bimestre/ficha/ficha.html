<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha de Aluno</title>
   <link rel="stylesheet" href="ficha.css">
</head>
<body>
<h1>Cadastro de Aluno</h1>

<form>

  Nome: <input type="text"><br><br>

  Idade: <input type="number"><br><br>

  Série:
  <select>
    <option>1º ano</option>
    <option>2º ano</option>
    <option>3º ano</option>
  </select><br><br>

  Turno:
  <input type="radio" name="turno"> Manhã
  <input type="radio" name="turno"> Tarde
  <input type="radio" name="turno"> Noite

  <br><br>

  <button>Enviar</button>

  <img src="https://via.placeholder.com/200" alt="Imagem de aluno">

  <table border="1"> 

  <tr>
    <th>Nome</th>
    <th>Idade</th>
    <th>Série</th>
  </tr>

  <tr>
    <td>Ana</td>
    <td>15</td>
    <td>1º ano</td>
  </tr>

  <tr>
    <td>João</td>
    <td>16</td>
    <td>2º ano</td>
  </tr>

</table>

</form>
</body>
</html>
