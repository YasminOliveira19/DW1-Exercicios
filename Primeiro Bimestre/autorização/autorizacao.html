<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Inscrição - Torneio Juvenil</title>
    <link rel="stylesheet" href="autorizacao.css">
</head>

<body>
    <main>
        <header>
            <h1>Cadastro de Atleta</h1>
            <p>Preencha os dados para verificar a elegibilidade e gerar a autorização.</p>
        </header>
        <section>
                    <form id="formInscricao" action="autorizacaoDes.html" method="GET">


                        <label for="cpf">CPF (apenas números):</label>
                        <input type="text" id="cpf" name="cpf" required>
                        <br><br>
                        <label for="nome">Nome completo:</label>
                        <input type="text" id="nome" name="nome" required>
                        <br><br>
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" name="idade" required>
                        <br><br>
                        <label for="nomeresponsavel">Nome do responsável:</label>
                        <input type="text" id="nomeresponsavel" name="nomeresponsavel" required>
                        <br><br>
                        <label for="cidadeorigem">Cidade de origem:</label>
                        <input type="text" id="cidadeorigem" name="cidadeorigem" required> 
                        <br><br>
                        <label for="cidadedestino">Cidade de Destino (o local onde ocorrerá a competição):</label>
                        <input type="text" id="cidadedestino" name="cidadedestino" required>
                        <br><br>
                        <label for="modalidade">Modalidade Esportiva:</label>
                        <select id="modalidade" name="modalidade" required>
                            <option value="">Selecione uma opção</option>
                            <option value="volei">Vôlei</option>
                            <option value="futebol">Futebol</option>
                            <option value="natacao">Natação</option>
                        </select>
                        <br><br>
                        <button type="submit">Validar Inscrição e Gerar Autorização</button>
                    </form>
        </section>
    </main>

    <script src="autorizacao.js"></script>
</body>

</html>
