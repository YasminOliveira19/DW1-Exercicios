<!DOCTYPE html>
<html lang=" en">

<head>
    <meta charset="UTF-8">
    <title>Agendamento</title>
    <link rel="stylesheet" href="agendamento.css">
</head>

<body>
    <main>
        <header>Agendamento de Consultas</header>

        <section>
            <form id="formAgendamento" action="agendado.html" method="GET">
                <h1>Dados Do Paciente(pessoa que vai se consultar)</h1>
                <label for="nome">Nome Completo (sem abreviações):</label>
                <input type="text" id="nome" name="nome" required>
                <br><br>
                <label for="cpf">CPF (apenas números):</label>
                <input type="text" id="cpf" name="cpf" required>
                <br><br>
                <label for="idade">Idade:</label>
                <input type="number" id="idade" name="idade" required>
                <br><br>
                <h2>Dados Da Consulta</h2>
                <label for="consulta">Qual tipo da consulta?</label>
                <select id="consulta" name="consulta" required>
                    <option value="">Selecione uma opção</option>
                    <option value="neurologia">Neurologia</option>
                    <option value="cardiologia">Cardiologia</option>
                    <option value="ortopedia">Ortopedia</option>
                </select>
                <br><br>
                <label for="turno">Qual o turno da consulta?</label>
                <select id="turno" name="turno" required>
                    <option value="">Selecione uma opção</option>
                    <option value="manha">Manhã</option>
                    <option value="tarde">Tarde</option>
                    <option value="noite">Noite</option>
                </select>
                <br><br>
                <label for="cidade">Cidade onde ocorrerá a consulta:</label>
                <input type="text" id="cidade" name="cidade" required>
                <br><br>

                <button type="submit"> Agendar Consulta</button>
            </form>
        </section>
    </main>

    <script src="agendamento.js"></script>

</body>

</html>
